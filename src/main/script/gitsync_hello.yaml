dag:
  id: gitsync_hello
  catchup: false
  default_timeout: 5m
tasks:
  - id: greet
    type: shell
    script: |
      #!/bin/bash
      echo "hello (UPDATED via git-sync)"
  - id: followup
    type: shell
    requires: [greet]
    script: |
      #!/bin/bash
      echo "new second task added by update"
